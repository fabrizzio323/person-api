name: Continuous-Integration with Github Actions

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build application jar
        working-directory: ./app/udemy
        run: mvn clean package

      - name: Build Docker image
        working-directory: ./person-api
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/person-api:latest .
          docker tag ${{ secrets.DOCKER_USERNAME }}/person-api:latest ${{ secrets.DOCKER_USERNAME }}/person-api:${{ github.run_id }}

      - name: Push to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/person-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/person-api:${{ github.run_id }}
