name: Continuous-Integration with Github Actions

on:
  push:
    branches:
      - master

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build application jar
        run: mvn clean package

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/person-api:latest .
          docker tag ${{ secrets.DOCKER_USERNAME }}/person-api:latest ${{ secrets.DOCKER_USERNAME }}/person-api:${{ github.run_id }}
      
      - name: tag, and push docker image to Amazon ECR
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/person-api:latest ${{ secrets.IMAGE_REPO_URL }}:${{ github.run_id }}
          docker tag ${{ secrets.DOCKER_USERNAME }}/person-api:latest ${{ secrets.IMAGE_REPO_URL }}:latest
          docker push ${{ secrets.IMAGE_REPO_URL }}:${{ github.run_id }}
          docker push ${{ secrets.IMAGE_REPO_URL }}:latest

      - name: Push to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/person-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/person-api:${{ github.run_id }}
